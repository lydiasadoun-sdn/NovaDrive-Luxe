<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaDrive Lux | Catalogue</title>
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <h1 class="logo">NovaDrive <span>Lux</span></h1>
            <ul class="nav-links">
                <li><a href="#">Accueil</a></li>
                <li><a href="./content/auth.html">authentification</a></li>
                <li><a href="./content/a-propos.html">a-propos</a></li>
                <li><a href="./content/contact.html">Contactez-nous</a></li>

                <li id="profil">profil</li>
            </ul>
        </nav>
        <div class="hero">
            <h2>L'Excellence Automobile</h2>
            <p>Découvrez notre collection de véhicules d'exception.</p>
        </div>
        <div id="profile-sidebar">
            <button id="close-sidebar">X</button>

            <button class="btn-filtre" data-categorie="Luxe">Luxe</button>

        <section class="catalogue-grid" id="catalogue"></section>
