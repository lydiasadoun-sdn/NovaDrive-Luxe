<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | NovaDrive Lux</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>

    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form>
                <h1>Créer un compte</h1>
                <input type="text" id="reg-nom" placeholder="Nom complet" required />
                <input type="email" id="reg-email" placeholder="Email" required />
                <input type="password" id="reg-mdp" placeholder="Mot de passe" required />
                <button type="button" id="btn-register">S'inscrire</button>
            </form>
        </div>

        <div class="form-container sign-in-container">
            <form>
                <h1>Se connecter</h1>
                <input type="email" id="log-email" placeholder="Email" required />
                <input type="password" id="log-mdp" placeholder="Mot de passe" required />
                <button type="button" id="btn-login">Connexion</button>
                <a href="../index.html" class="back-link">Retour à l'accueil</a>
            </form>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Déjà inscrit ?</h1>
                    <p>Connectez-vous pour accéder à nos services.</p>
                    <button class="ghost" id="signIn">Se connecter</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Nouveau ici ?</h1>
                    <p>Créez votre compte pour réserver votre véhicule.</p>
                    <button class="ghost" id="signUp">S'inscrire</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../javascript/auth.js"></script>
</body>
</html>
